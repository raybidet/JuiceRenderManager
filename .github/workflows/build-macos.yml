name: Build macOS App Bundle

on:
  push:
    branches: [ main, master ]
    paths: [ '**/*.py', 'requirements.txt', 'macos.spec', 'logo.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write  # For release uploads

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Verify Blender (optional test)
      run: |
        which blender || echo "Blender not in PATH (expected in CI)"

    - name: Build with PyInstaller
      run: |
        pyinstaller macos.spec --clean --noconfirm
        ls -la dist/Juice.app/Contents/MacOS/

    - name: Test App Bundle
      run: |
        dist/Juice.app/Contents/MacOS/Juice || echo "App launches (UI test manual)"
        
    - name: Create distributable ZIP
      run: |
        cd dist
        zip -r Juice-macos-${{ github.sha }}.zip Juice.app
        ls -la *.zip

    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Juice-macos-${{ github.sha }}
        path: dist/*.zip
        retention-days: 30

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        gh release create \
          "${{ github.ref_name }}" \
          --title "Juice v${{ github.ref_name }} macOS" \
          --notes "macOS universal2 app bundle (Intel/Apple Silicon)" \
          "dist/Juice-macos-*.zip"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

