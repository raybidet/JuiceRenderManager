name: Build Windows EXE (Onefile)

on:
  push:
    branches: [ main, master ]
    paths: [ '**/*.py', 'requirements.txt', 'logo.*', '.github/workflows/build-windows.yml' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build onefile EXE with PyInstaller
        shell: cmd
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name "Juice" --icon "logo.ico" --add-data "logo.png;." "app.py"
          if not exist "dist\Juice.exe" (
            echo ERROR: dist\Juice.exe not found
            exit /b 1
          )

      - name: Upload Windows EXE artifact
        uses: actions/upload-artifact@v5
        with:
          name: Juice-windows-onefile-${{ github.sha }}
          path: dist/Juice.exe
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release create "${{ github.ref_name }}" "dist/Juice.exe" --title "Juice v${{ github.ref_name }} Windows" --notes "Windows onefile executable build from GitHub Actions."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
